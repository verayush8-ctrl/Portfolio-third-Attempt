<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Editor Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background-color: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    position: sticky;
    top: 0;
    z-index: 1000;
}

header h1 {
    color: #00d4ff;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    width: 0;
    height: 2px;
    background: #00d4ff;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

section {
    scroll-margin-top: 90px;
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url('timeline.jpg') center/cover no-repeat;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.hero-content {
    position: relative;
    z-index: 2;
}

/* GLOW */
.hero h2 {
    font-size: 3rem;
    position: relative;
}

.hero h2::before {
    content: "";
    position: absolute;
    width: 120%;
    height: 120%;
    background: radial-gradient(circle, rgba(0,212,255,0.3), transparent);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(40px);
    animation: glowMove 3s infinite alternate;
    z-index: -1;
}

@keyframes glowMove {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.2); }
}

.hero p {
    margin-top: 10px;
    color: #ccc;
}

/* FADE */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* PORTFOLIO */
.portfolio {
    padding: 50px;
}

.portfolio h2 {
    text-align: center;
    margin-bottom: 40px;
}

/* GRID (THIS IS WHAT YOU WERE LOOKING FOR) */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px;
}

/* VIDEO EMBED */
.card iframe {
    width: 100%;
    height: 300px;
    border-radius: 10px;
    border: none;
}

/* CONTACT */
.contact {
    padding: 50px;
    text-align: center;
    background: #111;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #0a0a0a;
    color: #777;
}
</style>
</head>

<body>

<header>
    <h1>Ayush</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">
    <div class="hero-content">
        <h2>Hire a Video Editor Now</h2>
        <p>I create engaging, high-quality edits</p>
    </div>
</section>

<section class="portfolio fade" id="portfolio">
    <h2>My Work</h2>

    <div class="grid">

        <div class="card">
            <iframe src="https://www.youtube.com/embed/iWD523zkm-o"></iframe>
            <p>Project 1</p>
        </div>

        <div class="card">
            <iframe src="https://www.youtube.com/embed/0G2SgK2sZUE"></iframe>
            <p>Project 2</p>
        </div>

        <div class="card">
            <iframe src="https://www.youtube.com/embed/Z8q893Vb43A"></iframe>
            <p>Project 3</p>
        </div>

    </div>

</section>

<section class="contact fade" id="contact">
    <h2>Contact Me</h2>
    <p>Email: <a href="mailto:verayush8@gmail.com" style="color:#00d4ff;">verayush8@gmail.com</a></p>
    <p>Phone: <a href="https://wa.me/918941016319" style="color:#00d4ff;">+91 8941016319</a></p>
</section>

<footer>
    © 2026 Ayush | Video Editor Portfolio
</footer>

<script>
const faders = document.querySelectorAll('.fade');

function reveal() {
    const trigger = window.innerHeight * 0.85;

    faders.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if (top < trigger) {
            el.classList.add('show');
        }
    });
}

window.addEventListener('scroll', reveal);
window.addEventListener('load', reveal);
</script>

</body>
</html>
